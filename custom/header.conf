# Shadowrocket 懒人分组 · 自定义增强版
# 作者：Yingwei Guo (@guoyingwei6)
# 更新日期：{date}
# 上游：LOWERTOP/Shadowrocket lazy_group.conf
# 仓库：https://github.com/guoyingwei6/shadowrocket-lazy-custom
#
# 核心特性：
# 1. 每日自动拉取 LOWERTOP 懒人分组最新配置并合并自定义规则
# 2. 仅自建 DoH + Cloudflare 并发竞速
# 3. AI 多重规则保障：iab0x00 + blackmatrix7 + 手动域名兜底
# 4. 大规模去广告规则集 (blackmatrix7 Advertising，每日更新)，插入最前端优先命中
# 5. 学术域名强制直连 (blackmatrix7 Scholar，主流学术平台)
# 6. 精简策略组：裁剪 8 个低频策略组（YouTube/Netflix/Facebook/Amazon 等），UI 清爽
# 7. IPv6 关闭 + 代理连接 QUIC 屏蔽 + .cn 域名最前端直连（跳过 GEOIP 查询）
# 8. WebRTC 真实 IP 防泄漏 (stun-response-ip)
# 9. DNS 防泄漏加固：移除阿里/腾讯 DoH，删除 fallback-dns-server，禁用系统 DNS 回落
#
# 更新日志：
# 2026-04-15  规则位置修正：广告/学术/.cn 移至 [Rule] 最前端；修复 fallback-dns-server 未删除；清理冗余手写域名
# 2026-04-10  DNS 防泄漏加固：移除阿里/腾讯 DoH，去除 fallback，仅保留自建 + Cloudflare
# 2026-04-01  WebRTC IP 防泄漏；修正 QUIC 屏蔽范围（仅代理连接）；DNS 安全加固
# 2026-03-22  自建 DoH 加密 DNS + 阿里/腾讯明文 DNS 兜底，杜绝运营商 DNS
# 2026-03-19  初始版本
