# General section key-value overrides
# Lines here will replace matching keys in upstream [General]

ipv6 = false
# 仅保留自建 DoH + Cloudflare，移除阿里/腾讯（出口 IP 走移动骨干，泄露检测误判为中国移动）
dns-server = https://doh.guoyingwei.top/dns-query,https://dns.guoyingwei.top/1:-P8_P5Gwnk1_pv__tt__X__72N3-8zEA6_sAyA==,https://1.1.1.1/dns-query
# fallback-dns-server 不设置：明文被移动劫持，中国 DoH 泄露，国际 DoH 不稳定，主 DNS 全挂时 fallback 也无意义
# __DELETE__ 告知 merge.py 将该键从上游配置中完全删除（注释写法无效，脚本会忽略注释行）
fallback-dns-server = __DELETE__
dns-fallback-system = false
dns-direct-fallback-proxy = false
stun-response-ip = 1.0.0.1
stun-response-ipv6 = ::1
