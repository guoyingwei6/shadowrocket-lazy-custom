# Custom rules
#
# 本文件分两段，以 "# --- pre-final ---" 为分隔符：
#   ● 分隔符以上 → 插入到 [Rule] 最前端（早于所有上游服务规则命中）
#   ● 分隔符以下 → 插入到 FINAL 之前
#
# 去广告必须最早命中，否则可能被 Global 等服务规则抢先匹配导致漏拦截。
# .cn / 学术直连放在最前可跳过后续所有规则扫描，避免 GEOIP DNS 查询开销。

# ════════════════════════════════════════════════════════════════════
# TOP RULES — 插入到 [Rule] 最前端
# ════════════════════════════════════════════════════════════════════

# 去广告（blackmatrix7 Advertising 规则集，大规模广告域名，每日更新）
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Advertising/Advertising.list,REJECT

# 学术网站 → DIRECT（blackmatrix7 Scholar 规则集，主流学术平台直连）
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Scholar/Scholar.list,DIRECT

# .cn 域名全部直连（域名层面短路，跳过 GEOIP DNS 查询开销）
DOMAIN-SUFFIX,cn,DIRECT

# --- pre-final ---
# ════════════════════════════════════════════════════════════════════
# PRE-FINAL RULES — 插入到 FINAL 之前
# ════════════════════════════════════════════════════════════════════

# AI 补充规则集（blackmatrix7，活跃维护，作为上游 iab0x00 的多重保障）
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/OpenAI/OpenAI.list,AI
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Claude/Claude.list,AI
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Gemini/Gemini.list,AI

# AI 手动兜底
# anthropic.com / claudeusercontent.com：API 调用核心域名，blackmatrix7 Claude 规则集可能不含，显式保留
DOMAIN-SUFFIX,anthropic.com,AI
DOMAIN-SUFFIX,claudeusercontent.com,AI
# 以下域名经确认不在 blackmatrix7 三套规则集中，保留手动兜底
DOMAIN-SUFFIX,x.ai,AI
DOMAIN-SUFFIX,grok.com,AI
DOMAIN-SUFFIX,perplexity.ai,AI

# 谷歌服务补充（单一特定主机，用 DOMAIN 精确匹配，避免 DOMAIN-SUFFIX 匹配子域）
DOMAIN,antigravity-unleash.goog,谷歌服务
